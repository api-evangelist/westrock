  - type: Features
    data:
      - name: Corrugated Packaging
        description: >-
          Full-service corrugated container design and manufacturing for e-commerce,
          retail, and industrial shipping applications.
      - name: Consumer Packaging
        description: >-
          Folding cartons, multi-pack carriers, and paperboard packaging for
          food and beverage, healthcare, and consumer goods brands.
      - name: Connected Packaging
        description: >-
          Digital packaging solutions with QR codes, NFC technology, and digital
          watermarking enabling product authentication and consumer engagement.
      - name: Coupa Supplier Portal
        description: >-
          Electronic supplier connectivity platform supporting purchase order
          processing, invoicing, and advance ship notifications via cXML.
      - name: Sustainable Packaging
        description: >-
          Renewable, recyclable, and compostable packaging materials with science-based
          sustainability targets and circular economy commitments.
      - name: EDI Integration
        description: >-
          Electronic Data Interchange connectivity for high-volume trading partners
          supporting order management, invoicing, and logistics transactions.
  - type: UseCases
    data:
      - name: E-Commerce Fulfillment
        description: >-
          Custom-designed corrugated packaging for e-commerce shipments optimized
          for dimensional weight pricing and damage prevention.
      - name: Retail Shelf-Ready Packaging
        description: >-
          Display-ready packaging solutions designed to transition from shipping
          container to retail shelf without repacking.
      - name: Food Service Packaging
        description: >-
          Paperboard and packaging solutions for quick-service restaurants,
          food delivery, and foodservice distribution.
      - name: Supply Chain Integration
        description: >-
          Digital supply chain connectivity for order-to-invoice automation with
          manufacturing customers and retail trading partners.
      - name: Brand Protection
        description: >-
          Connected packaging with digital watermarks and authentication features
          to combat counterfeiting and support product recalls.
  - type: Integrations
    data:
      - name: Coupa
        description: >-
          Coupa Supplier Portal (CSP) integration for electronic purchase orders,
          invoices, and advance ship notices via cXML data exchange.
      - name: EDI Network
        description: >-
          EDI compliance integration supporting ANSI X12 transaction sets for
          high-volume customer and supplier transactions.
      - name: SAP ERP
        description: >-
          Enterprise resource planning integration for mill operations, converting
          facilities, and financial management.
      - name: o9 Solutions
        description: >-
          Supply chain planning platform providing a digital twin of the network
          linking mills, converters, warehouses, and customers.
