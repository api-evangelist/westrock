name: WestRock
description: >-
  WestRock (now Smurfit Westrock following its 2024 merger with Smurfit Kappa) is one
  of the world's largest paper and packaging companies. The company provides
  differentiated paper and packaging solutions including corrugated containers, consumer
  packaging, displays, and specialty packaging. WestRock serves consumer and industrial
  markets with an integrated supply chain connecting mills, converting operations, and
  customers globally.
